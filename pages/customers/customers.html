<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clientes - FactuFácil</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="../styles/customers.css" rel="stylesheet">
  <link href="../../public/shared/app-shell.css" rel="stylesheet">
</head>
<body>

  <!-- Main Content -->
  <main class="main-content">
    <div class="page-header">
      <h1 class="page-title"><i class="fas fa-users"></i> Gestión de Clientes</h1>
      <div>
        <a href="../providers/providers.html" class="btn btn-outline-primary me-2">
          <i class="fas fa-truck"></i> Proveedores
        </a>
        <a href="../../public/frontPage/frontPage.html" class="btn btn-secondary"><i class="fas fa-home"></i> Panel Principal</a>
      </div>
    </div>

    <div id="authStatus" class="alert alert-info mb-4 d-none"></div>

    <!-- Client Form -->
    <div class="modern-card mb-4">
      <div class="card-body">
        <h5 class="card-title">Agregar/Editar Cliente</h5>
        <form id="clientForm" class="row gy-3">
          <input type="hidden" id="clientId">
          <div class="col-md-4">
            <label for="name" class="form-label">Nombre</label>
            <input type="text" id="name" class="form-control" placeholder="Nombre del cliente" required>
          </div>
          <div class="col-md-4">
            <label for="nif" class="form-label">NIF/NIE/CIF</label>
            <input type="text" id="nif" class="form-control" placeholder="NIF/NIE/CIF" required>
          </div>
          <div class="col-md-4">
            <label for="email" class="form-label">Email</label>
            <input type="email" id="email" class="form-control" placeholder="cliente@ejemplo.com" required>
          </div>
          <div class="col-md-4">
            <label for="phone" class="form-label">Teléfono</label>
            <input type="tel" id="phone" class="form-control" placeholder="+34 600 000 000">
          </div>
          <div class="col-md-4">
            <label for="address" class="form-label">Dirección fiscal</label>
            <input type="text" id="address" class="form-control" placeholder="Calle, nº">
          </div>
          <div class="col-md-4">
            <label for="country" class="form-label">País</label>
            <div class="country-combobox position-relative">
              <div class="input-group">
                <input type="text" id="country" class="form-control" placeholder="España" autocomplete="off">
                <button type="button" id="countryToggle" class="btn btn-outline-secondary" aria-label="Abrir lista de países">
                  <i class="fas fa-chevron-down"></i>
                </button>
              </div>
              <div id="countryDropdown" class="dropdown-menu w-100 d-none shadow-sm" style="max-height: 220px; overflow-y: auto; z-index: 20;">
                <button type="button" class="dropdown-item" data-country-value="España">España</button>
                <button type="button" class="dropdown-item" data-country-value="Portugal">Portugal</button>
                <button type="button" class="dropdown-item" data-country-value="Francia">Francia</button>
                <button type="button" class="dropdown-item" data-country-value="Alemania">Alemania</button>
                <button type="button" class="dropdown-item" data-country-value="Italia">Italia</button>
                <button type="button" class="dropdown-item" data-country-value="Andorra">Andorra</button>
                <button type="button" class="dropdown-item" data-country-value="Austria">Austria</button>
                <button type="button" class="dropdown-item" data-country-value="Bélgica">Bélgica</button>
                <button type="button" class="dropdown-item" data-country-value="Croacia">Croacia</button>
                <button type="button" class="dropdown-item" data-country-value="Dinamarca">Dinamarca</button>
                <button type="button" class="dropdown-item" data-country-value="Eslovaquia">Eslovaquia</button>
                <button type="button" class="dropdown-item" data-country-value="Eslovenia">Eslovenia</button>
                <button type="button" class="dropdown-item" data-country-value="Estonia">Estonia</button>
                <button type="button" class="dropdown-item" data-country-value="Finlandia">Finlandia</button>
                <button type="button" class="dropdown-item" data-country-value="Grecia">Grecia</button>
                <button type="button" class="dropdown-item" data-country-value="Hungría">Hungría</button>
                <button type="button" class="dropdown-item" data-country-value="Irlanda">Irlanda</button>
                <button type="button" class="dropdown-item" data-country-value="Letonia">Letonia</button>
                <button type="button" class="dropdown-item" data-country-value="Lituania">Lituania</button>
                <button type="button" class="dropdown-item" data-country-value="Luxemburgo">Luxemburgo</button>
                <button type="button" class="dropdown-item" data-country-value="Malta">Malta</button>
                <button type="button" class="dropdown-item" data-country-value="Noruega">Noruega</button>
                <button type="button" class="dropdown-item" data-country-value="Polonia">Polonia</button>
                <button type="button" class="dropdown-item" data-country-value="República Checa">República Checa</button>
                <button type="button" class="dropdown-item" data-country-value="Rumanía">Rumanía</button>
                <button type="button" class="dropdown-item" data-country-value="Suecia">Suecia</button>
                <button type="button" class="dropdown-item" data-country-value="Suiza">Suiza</button>
                <button type="button" class="dropdown-item" data-country-value="Reino Unido">Reino Unido</button>
                <button type="button" class="dropdown-item" data-country-value="Estados Unidos">Estados Unidos</button>
                <button type="button" class="dropdown-item" data-country-value="México">México</button>
                <button type="button" class="dropdown-item" data-country-value="Argentina">Argentina</button>
                <button type="button" class="dropdown-item" data-country-value="Brasil">Brasil</button>
                <button type="button" class="dropdown-item" data-country-value="Chile">Chile</button>
                <button type="button" class="dropdown-item" data-country-value="Colombia">Colombia</button>
                <button type="button" class="dropdown-item" data-country-value="Perú">Perú</button>
                <button type="button" class="dropdown-item" data-country-value="Uruguay">Uruguay</button>
                <button type="button" class="dropdown-item" data-country-value="Venezuela">Venezuela</button>
                <button type="button" class="dropdown-item" data-country-value="Países Bajos">Países Bajos</button>
                <div id="countryEmpty" class="dropdown-item-text text-muted d-none">No hay coincidencias.</div>
              </div>
            </div>
          </div>
          <div class="col-12 d-flex gap-2">
            <button type="submit" class="btn btn-primary">
              <i class="fas fa-save"></i> Guardar cliente
            </button>
            <button type="button" id="clearBtn" class="btn btn-outline-secondary">
              <i class="fas fa-eraser"></i> Nuevo cliente
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- Clients List -->
    <div class="modern-card">
      <div class="card-body">
        <h5 class="card-title">Clientes guardados</h5>
        <div class="table-wrapper">
          <table class="table table-striped table-hover">
            <thead class="table-light">
              <tr>
                <th>Nombre</th>
                <th>NIF/NIE/CIF</th>
                <th>Email</th>
                <th>Teléfono</th>
                <th>País</th>
                <th>Creado</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="clientsTbody">
              <!-- Clients will be populated here -->
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <!-- Scripts -->
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
  <script src="../../public/shared/firebase-config.js"></script>
  <script src="../../public/shared/auth-system.js"></script>
  <script src="../../public/shared/customer-page-utils.js"></script>
  <script src="../services/clients/clientService-browser.js"></script>
  <script src="../../public/shared/sidebar.js"></script>
  <script src="./customers.js"></script>
</body>
</html>
