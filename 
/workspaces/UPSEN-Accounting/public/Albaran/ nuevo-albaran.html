<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Nuevo albarán</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="nuevo-albaran.css" rel="stylesheet">
</head>
<body>

<div class="container-fluid mt-4">
  <div class="card shadow-sm border-0 rounded-4 bg-white">
    <div class="card-body p-4">

      <h3 class="fw-semibold mb-4" style="color:#1F2937;">Nuevo albarán</h3>

      <div class="card border-0 shadow-sm mb-4 rounded-3 bg-lightest">
        <div class="card-body p-4">
          <h5 class="fw-semibold mb-3">Información básica</h5>
          <div class="row g-3">
            <div class="col-md-3">
              <label class="form-label">Número</label>
              <input type="text" class="form-control" value="AL-2026-0001">
            </div>
            <div class="col-md-3">
              <label class="form-label">Serie</label>
              <select class="form-select">
                <option>Serie: Albaranes</option>
              </select>
            </div>
            <div class="col-md-3">
              <label class="form-label">Fecha</label>
              <input type="date" class="form-control">
            </div>
            <div class="col-md-3">
              <label class="form-label">Cliente</label>
              <div class="d-flex gap-2">
                <select class="form-select" id="clientesDropdown">
                  <option>Selecciona cliente</option>
                </select>
                <button class="btn btn-outline-primary">Nuevo</button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="card border-0 shadow-sm mb-4 rounded-3">
        <div class="card-body p-4">
          <div class="d-flex justify-content-between mb-3">
            <h5 class="fw-semibold">Conceptos</h5>
            <button class="btn btn-outline-primary btn-sm" id="addConceptBtn">Añadir otro concepto</button>
          </div>
          <div class="table-responsive">
            <table class="table align-middle" id="tablaConceptos">
              <thead class="bg-lightest">
                <tr>
                  <th>Concepto</th>
                  <th class="text-center">Cantidad</th>
                  <th class="text-end">Precio</th>
                  <th class="text-center">Desc %</th>
                  <th class="text-center">IVA %</th>
                  <th class="text-end">Base</th>
                  <th class="text-end">Subtotal</th>
                  <th class="text-center">Acción</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </div>
      </div>

      <div class="card border-0 shadow-sm mb-4 rounded-3">
        <div class="card-body p-4">
          <div class="row justify-content-end">
            <div class="col-md-4 text-end">
              <h5>Resumen</h5>
              <div>Base: <span id="baseTotal">0.00 €</span></div>
              <div>IVA: <span id="ivaTotal">0.00 €</span></div>
              <div>Retención: <span id="retencionTotal">0.00 €</span></div>
              <hr>
              <h4 class="text-primary">Total: <span id="totalFinal">0.00 €</span></h4>
            </div>
          </div>
        </div>
      </div>

      <div class="accordion mb-4" id="accordionAlbaran">
        <div class="accordion-item border-0 shadow-sm rounded-3 overflow-hidden">
          <h2 class="accordion-header">
            <button class="accordion-button collapsed fw-semibold" type="button" data-bs-toggle="collapse" data-bs-target="#opcionesAvanzadas">
              Opciones avanzadas
            </button>
          </h2>
          <div id="opcionesAvanzadas" class="accordion-collapse collapse" data-bs-parent="#accordionAlbaran">
            <div class="accordion-body bg-lightest">
              <div class="row g-3">
                <div class="col-md-6">
                  <label class="form-label fw-semibold">Notas privadas</label>
                  <textarea class="form-control" rows="3"></textarea>
                </div>
                <div class="col-md-6">
                  <label class="form-label fw-semibold">Notas en el albarán</label>
                  <textarea class="form-control" rows="3"></textarea>
                </div>
                <div class="col-md-4">
                  <label class="form-label fw-semibold">Retención</label>
                  <select class="form-select" id="retencionSelect">
                    <option value="0" selected>Sin retención</option>
                    <option value="7">7%</option>
                    <option value="15">15%</option>
                    <option value="19">19%</option>
                  </select>
                </div>
                <div class="col-md-4">
                  <label class="form-label fw-semibold">Idioma</label>
                  <select class="form-select">
                    <option>Por defecto del cliente</option>
                    <option>Español</option>
                    <option>Inglés</option>
                  </select>
                </div>
                <div class="col-md-4">
                  <label class="form-label fw-semibold">Formato numérico</label>
                  <select class="form-select">
                    <option>Por defecto del cliente</option>
                    <option>1.234,56</option>
                    <option>1,234.56</option>
                  </select>
                </div>
                <div class="col-md-6">
                  <label class="form-label fw-semibold">Etiquetas</label>
                  <input type="text" class="form-control" placeholder="Añade etiquetas">
                </div>
                <div class="col-md-6">
                  <label class="form-label fw-semibold">Servicios externos</label>
                  <input type="text" class="form-control" placeholder="Dropbox, Google Drive...">
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="text-end">
        <button class="btn btn-outline-secondary me-2">Cancelar</button>
        <button class="btn btn-primary">Crear albarán</button>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="nuevo-albaran.js"></script>
</body>
</html>
