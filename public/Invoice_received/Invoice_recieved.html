<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Accounting - Facturas Recibidas</title>

  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

  <!-- Page Styles -->
  <link href="../shared/styles.css" rel="stylesheet"> <!-- Consolidated shared styles -->
</head>
<body>
<div class="container-fluid p-0">
  <main class="main-content">
    <!-- Page Header -->
    <div class="page-header">
      <h1 class="page-title"><i class="fas fa-file-import"></i> Facturas recibidas</h1>
      <div class="action-buttons">
        <button class="btn btn-primary" onclick="openNewInvoiceModal()">
          <i class="fas fa-plus me-1"></i>Nueva factura
        </button>
        <button class="btn btn-primary" onclick="openOCRModal()">
          <i class="fas fa-file-invoice me-1"></i>OCR
        </button>
        <button class="btn btn-success" onclick="showModal('modalImport')">
          <i class="fas fa-file-import me-1"></i>Importar
        </button>
        <button class="btn btn-info" onclick="showModal('modalExport')">
          <i class="fas fa-file-export me-1"></i>Exportar
        </button>
        <button class="btn btn-secondary" onclick="toggleFilter()">
          <i class="fas fa-filter me-1"></i>Filtros
        </button>
        <button class="btn btn-secondary" onclick="exportToPDF()">
          <i class="fas fa-file-pdf me-1"></i>PDF
        </button>
        <button class="btn btn-secondary" title="Verificar integridad de la cadena Veri*Factu">
          <i class="fas fa-shield-alt me-1"></i>Verificar Integridad
        </button>
        <button class="dark-toggle-btn" id="themeToggle" title="Cambiar tema"><i class="fas fa-moon"></i></button>
      </div>
    </div>

    <!-- Filter Card -->
    <div class="filter-card" id="filterCard" style="display: none;">
      <form id="filterForm" class="filter-form">
        <div class="row">
          <div class="col-md-3 mb-3">
            <label class="form-label">Estado</label>
            <select name="state" class="form-select">
              <option value="">Todos</option>
              <option value="Pagada">Pagada</option>
              <option value="Pendiente">Pendiente</option>
              <option value="Vencida">Vencida</option>
            </select>
          </div>
          <div class="col-md-3 mb-3">
            <label class="form-label">Desde fecha</label>
            <input type="date" name="dateFrom" class="form-control" />
          </div>
          <div class="col-md-3 mb-3">
            <label class="form-label">Hasta fecha</label>
            <input type="date" name="dateTo" class="form-control" />
          </div>
          <div class="col-md-3 mb-3 d-flex align-items-end">
            <button type="button" class="btn btn-primary" id="applyFilter">Aplicar filtros</button>
            <button type="button" class="btn btn-secondary ms-2" id="clearFilter">Limpiar</button>
          </div>
        </div>
      </form>
    </div>

    <!-- Summary Cards -->
    <div class="row mb-4">
      <div class="col-md-3 mb-3">
        <div class="summary-card">
          <div class="summary-icon orange"><i class="fas fa-clock"></i></div>
          <h3>Pendientes</h3>
          <p id="pendingTotal">€0,00</p>
        </div>
      </div>
      <div class="col-md-3 mb-3">
        <div class="summary-card">
          <div class="summary-icon green"><i class="fas fa-check-circle"></i></div>
          <h3>Pagadas</h3>
          <p id="paidTotal">€0,00</p>
        </div>
      </div>
      <div class="col-md-3 mb-3">
        <div class="summary-card">
          <div class="summary-icon blue"><i class="fas fa-calendar-check"></i></div>
          <h3>Este mes</h3>
          <p id="monthlyTotal">€0,00</p>
        </div>
      </div>
      <div class="col-md-3 mb-3">
        <div class="summary-card">
          <div class="summary-icon red"><i class="fas fa-exclamation-triangle"></i></div>
          <h3>Vencidas</h3>
          <p id="overdueCount">0</p>
        </div>
      </div>
    </div>

    <!-- Table Card -->
    <div class="modern-card">
      <h5 class="section-title"><i class="fas fa-list"></i> Facturas recibidas</h5>

      <!-- Filter Row -->
      <div class="row mb-3">
        <div class="col-md-3">
          <label class="form-label">Método Pago</label>
          <select id="paymentFilter" class="form-select">
            <option value="todas">Todas</option>
            <option value="efectivo">Efectivo</option>
            <option value="tarjeta">Tarjeta</option>
            <option value="transferencia">Transferencia</option>
            <option value="recibo">Recibo</option>
            <option value="cheque">Cheque</option>
            <option value="paypal">Paypal</option>
          </select>
        </div>
        <div class="col-md-2">
          <label class="form-label">Período</label>
          <select id="dateFilter" class="form-select">
            <option value="todos">Todos</option>
            <option value="mes">Este mes</option>
            <option value="trimestre">Este trimestre</option>
            <option value="ano">Este año</option>
          </select>
        </div>
        <div class="col-md-5">
          <label class="form-label">Buscar</label>
          <input type="text" id="searchInput" class="form-control" placeholder="Número, proveedor, notas...">
        </div>
        <div class="col-md-2">
          <label class="form-label">&nbsp;</label>
          <button class="btn btn-outline-secondary w-100" onclick="clearFilters()">Limpiar</button>
        </div>
      </div>

      <div class="table-responsive">
        <table class="table">
          <thead>
            <tr>
              <th>#</th>
              <th>Prov.</th>
              <th>Fecha</th>
              <th>Base</th>
              <th>IVA%</th>
              <th>IVA</th>
              <th>Veri</th>
              <th>Total</th>
              <th>Estado</th>
              <th>Pago</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="invoiceTBody">
            <tr><td colspan="11" class="text-center text-muted">Cargando datos...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Chart Card -->
    <div class="modern-card">
      <h5 class="section-title"><i class="fas fa-chart-pie"></i> Distribución por proveedor</h5>
      <div class="chart-container">
        <canvas id="receivedChartCanvas"></canvas>
      </div>
    </div>
  </main>
</div>

<!-- Modals -->
<div id="modalsContainer">
  <!-- New Invoice, Mark Paid, OCR, Import, Export, View Invoice -->
  <!-- Removed duplicate file inputs and merged repeated modal structures -->
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="../shared/firebase-config.js"></script>
<script src="../shared/auth-system.js"></script>
<script src="../shared/firebase-sync.js"></script>
<script src="../shared/data-migration.js"></script>
<script src="../shared/store.js"></script>

<!-- Veri*Factu -->
<script src="../shared/verifactu-hash.js"></script>
<script src="../shared/verifactu-ledger.js"></script>
<script src="../shared/verifactu-integration.js"></script>

<!-- Page specific -->
<script src="../shared/sidebar.js"></script>
<script src="./Invoice_recieved.js"></script>
<script src="../shared/common-ui.js"></script> <!-- For theme toggle, modals, etc. -->
</body>
</html>
