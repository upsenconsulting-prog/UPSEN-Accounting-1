<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FactuFácil - Gastos</title>

<!-- Fonts & CSS -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<!-- Shared CSS (buttons, cards, tables, modals, badges, forms, dark mode variables) -->
<link href="../shared/shared.css" rel="stylesheet">

<!-- Page-specific CSS -->
<style>
.main-content { margin-left: 260px; padding: 32px; min-height: 100vh; }
.page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 15px; }
.page-title { font-size: 1.8em; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 15px; margin: 0; }
.page-title i { color: var(--metric3-text); }
@media (max-width: 992px) {
    .main-content { margin-left: 0; padding: 20px; }
}
</style>
</head>

<body>
<!-- Main Content -->
<main class="main-content">
    <div class="page-header">
        <h1 class="page-title">
            <i class="fas fa-file-invoice-dollar"></i> Gastos
        </h1>
        <div class="action-buttons">
            <button class="btn btn-primary" id="newExpenseBtn"><i class="fas fa-plus me-2"></i>Nuevo gasto</button>
            <button class="btn btn-success" id="btnImport"><i class="fas fa-file-import me-2"></i>Importar</button>
            <button class="btn btn-info" id="btnExport"><i class="fas fa-file-export me-2"></i>Exportar</button>
            <button class="btn btn-secondary" id="refreshBtn"><i class="fas fa-sync-alt me-2"></i>Actualizar</button>
            <button class="dark-toggle-btn" id="themeToggle" title="Cambiar tema"><i class="fas fa-moon"></i></button>
        </div>
    </div>

    <!-- KPI Cards -->
    <div class="row">
        <div class="col-md-3 mb-3">
            <div class="kpi-card" style="background: var(--metric3-bg); color: var(--metric3-text);">
                <div class="kpi-header">
                    <div>
                        <div class="kpi-title">Gastos mensuales</div>
                        <h2 class="kpi-value" id="monthlyTotal">€0,00</h2>
                        <div class="kpi-subtitle">Este mes</div>
                    </div>
                    <div class="kpi-icon" style="background: rgb(255,255,255,0.2);"><i class="fas fa-euro-sign"></i></div>
                </div>
            </div>
        </div>
        <div class="col-md-3 mb-3">
            <div class="kpi-card" style="background: var(--metric2-bg); color: var(--metric2-text);">
                <div class="kpi-header">
                    <div>
                        <div class="kpi-title">IVA soportado</div>
                        <h2 class="kpi-value" id="monthlyIVA">€0,00</h2>
                        <div class="kpi-subtitle">Este mes</div>
                    </div>
                    <div class="kpi-icon" style="background: rgb(255,255,255,0.2);"><i class="fas fa-percent"></i></div>
                </div>
            </div>
        </div>
        <div class="col-md-3 mb-3">
            <div class="kpi-card" style="background: var(--metric1-bg); color: var(--metric1-text);">
                <div class="kpi-header">
                    <div>
                        <div class="kpi-title">Categoría principal</div>
                        <h2 class="kpi-value" id="topCategory" style="font-size: 1.2em;">Sin datos</h2>
                        <div class="kpi-subtitle">Mayor gasto</div>
                    </div>
                    <div class="kpi-icon" style="background: rgb(255,255,255,0.2);"><i class="fas fa-tag"></i></div>
                </div>
            </div>
        </div>
        <div class="col-md-3 mb-3">
            <div class="kpi-card" style="background: var(--metric4-bg); color: var(--metric4-text);">
                <div class="kpi-header">
                    <div>
                        <div class="kpi-title">Último gasto</div>
                        <h2 class="kpi-value" id="lastExpense" style="font-size: 1em;">Sin gastos</h2>
                        <div class="kpi-subtitle">Más reciente</div>
                    </div>
                    <div class="kpi-icon" style="background: rgb(255,255,255,0.2);"><i class="fas fa-receipt"></i></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Expenses Table -->
    <div class="modern-card">
        <h5 class="section-title"><i class="fas fa-list"></i> Resumen de gastos</h5>
        <div class="table-responsive">
            <table class="table">
                <thead>
                    <tr>
                        <th><i class="fas fa-calendar me-2"></i>Fecha</th>
                        <th><i class="fas fa-tag me-2"></i>Categoría</th>
                        <th><i class="fas fa-euro-sign me-2"></i>Base</th>
                        <th><i class="fas fa-percent me-2"></i>IVA</th>
                        <th><i class="fas fa-euro-sign me-2"></i>IVA €</th>
                        <th><i class="fas fa-euro-sign me-2"></i>Total</th>
                        <th><i class="fas fa-sticky-note me-2"></i>Notas</th>
                        <th><i class="fas fa-cog me-2"></i>Acciones</th>
                    </tr>
                </thead>
                <tbody id="expenseTBody">
                    <tr>
                        <td colspan="8" class="text-center" style="color: var(--muted);">Cargando datos...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Chart -->
    <div class="modern-card">
        <h5 class="section-title"><i class="fas fa-chart-pie"></i> Distribución por categoría</h5>
        <div class="chart-container">
            <canvas id="expenseChartCanvas"></canvas>
        </div>
    </div>
</main>

<!-- Modals (New, View, Import, Export) -->
<div id="modalsContainer">
    <!-- Shared modal HTML can also be loaded dynamically via shared JS if desired -->
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="../shared/sidebar.js"></script>
<script src="../shared/shared.js"></script>

<!-- Page-specific initialization -->
<script>
document.addEventListener('DOMContentLoaded', function() {
    themeManager.init('#themeToggle');           // Shared dark/light toggle
    modalManager.init(['modalNewExpense','viewExpenseModal','modalImport','modalExport']); // Shared modals
    loadUserInfo();                               // Load sidebar user info
    bindExpensePageButtons();                     // Bind New, Save, Import, Export, Refresh

    // Optional: trigger initial chart render
    if (typeof renderExpenses === 'function') renderExpenses();
    if (typeof renderChart === 'function') renderChart();
    if (typeof renderSummaryCards === 'function') renderSummaryCards();
});
</script>
</body>
</html>
