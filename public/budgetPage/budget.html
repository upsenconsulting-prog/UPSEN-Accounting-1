<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Presupuestos - FactuFácil</title>

<!-- Fonts & Icons -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<!-- Shared CSS for all pages -->
<link href="../shared/shared.css" rel="stylesheet">
</head>

<body>
    <!-- MAIN CONTENT -->
    <main class="main-content">
      <div class="page-header">
        <h1 class="page-title"><i class="fas fa-calculator"></i> Presupuestos</h1>

        <div class="action-buttons d-flex gap-2">
          <button class="btn btn-primary" id="newBudgetBtn"><i class="fas fa-plus me-2"></i>Nuevo presupuesto</button>
          <button class="btn btn-secondary" id="viewBudgetsBtn"><i class="fas fa-folder-open me-2"></i>Ver presupuestos</button>
          <button class="dark-toggle-btn" id="themeToggle" title="Cambiar tema"><i class="fas fa-moon"></i></button>
        </div>
      </div>

      <div class="modern-card">
        <form id="budgetForm">
          <div class="row g-3">
            <div class="col-md-3">
              <label class="form-label">Número</label>
              <input type="text" id="number" class="form-control" readonly value="PRE-001">
            </div>
            <div class="col-md-3">
              <label class="form-label">Fecha</label>
              <input type="date" id="date" class="form-control">
            </div>
            <div class="col-md-3">
              <label class="form-label">Cliente *</label>
              <input type="text" id="customer" class="form-control" placeholder="Nombre">
            </div>
            <div class="col-md-3">
              <label class="form-label">Estado</label>
              <select id="status" class="form-select">
                <option value="pending">Pendiente</option>
                <option value="approved">Aprobado</option>
                <option value="rejected">Vencido</option>
              </select>
            </div>
          </div>

          <h4 class="section-title mt-4"><i class="fas fa-list"></i> Artículos</h4>
          <div class="table-responsive border rounded">
            <table class="table mb-0">
              <thead>
                <tr>
                  <th>Descripción</th>
                  <th>Cantidad</th>
                  <th>Precio</th>
                  <th class="text-end">Total</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="itemsTbody">
                <tr>
                  <td><input type="text" class="form-control" placeholder="Producto/Servicio"></td>
                  <td><input type="number" class="form-control" value="1"></td>
                  <td><input type="number" class="form-control" value="0.00"></td>
                  <td class="text-end fw-bold">0.00 EUR</td>
                  <td><button type="button" class="btn text-danger"><i class="fas fa-trash"></i></button></td>
                </tr>
              </tbody>
            </table>
          </div>

          <div class="mt-4 text-end">
            <h3 id="grandTotal" class="mb-3">Total: 0.00 EUR</h3>
            <button type="button" class="btn btn-primary">Guardar presupuesto</button>
          </div>
        </form>
      </div>
    </main>

    <!-- Modal: View Budgets -->
    <div class="modal fade" id="budgetsModal" tabindex="-1">
      <div class="modal-dialog modal-xl">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Presupuestos guardados</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body p-0">
            <table class="table mb-0">
              <thead>
                <tr>
                  <th>No.</th>
                  <th>Cliente</th>
                  <th>Fecha</th>
                  <th>Estado</th>
                  <th class="text-end">Total</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>PRE-001</td>
                  <td class="td-client">Ejemplo Cliente</td>
                  <td>20/03/2026</td>
                  <td><span class="badge-status badge-pending">Pendiente</span></td>
                  <td class="text-end">1.500,00 EUR</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../shared/sidebar.js"></script>
<script src="../shared/shared.js"></script>

<script>
// Page-specific JS
document.addEventListener('DOMContentLoaded', () => {
  // Open modal for viewing budgets
  const viewBtn = document.getElementById('viewBudgetsBtn');
  if(viewBtn) viewBtn.addEventListener('click', () => {
    new bootstrap.Modal(document.getElementById('budgetsModal')).show();
  });
});
</script>

</body>
</html>
