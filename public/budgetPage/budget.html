
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Presupuestos - FactuFácil</title>

<!-- Font Inter -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">


  <link href="style.css" rel="stylesheet">
</head>

<body>
    <main class="main-content">
      <div class="page-header">
        <h1 class="page-title"><i class="fas fa-calculator"></i> Presupuestos</h1>

        <div class="action-buttons d-flex gap-2">
          <button class="btn btn-primary" id="newBudgetBtn"><i class="fas fa-plus me-2"></i>Nuevo presupuesto</button>
          <button class="btn btn-secondary" id="viewBudgetsBtn"><i class="fas fa-folder-open me-2"></i>Ver presupuestos</button>
        </div>
      </div>

      <div class="modern-card">
<link href="../shared/app-shell.css" rel="stylesheet">
        <form id="budgetForm">
          <div class="row g-3">
            <div class="col-md-3">
              <label class="form-label">Numero</label>
              <input type="text" id="number" class="form-control" readonly value="PRE-001">
            </div>
            <div class="col-md-3">
              <label class="form-label">Fecha</label>
              <input type="date" id="date" class="form-control">
            </div>
            <div class="col-md-3">
              <label class="form-label">Validez</label>
              <input type="date" id="validity" class="form-control">
            </div>
            <div class="col-md-3">
              <label class="form-label">Retención (%)</label>
              <input type="number" id="retention" class="form-control" placeholder="0" value="0">
            </div>
            <div class="col-md-3">
              <label class="form-label">Cliente *</label>
              <input type="text" id="customer" class="form-control" placeholder="Nombre">
            </div>
            <div class="col-md-3">
              <label class="form-label">Estado</label>
              <select id="status" class="form-select">
                <option value="pending">Pendiente</option>
                <option value="approved">Aprobado</option>
                <option value="rejected">Vencido</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label">Notas</label>
              <input type="text" id="notes" class="form-control" placeholder="Notas adicionales">
            </div>
            <div class="col-md-6">
              <label class="form-label">Etiquetas</label>
              <input type="text" id="tags" class="form-control" placeholder="Etiquetas (separadas por comas)">
            </div>
          </div>

          <h4 class="section-title mt-4"><i class="fas fa-list"></i> Articulos</h4>
          <div class="table-responsive border rounded mb-3">
            <table class="table mb-0" id="itemsTable">
              <thead>
                <tr>
                  <th>Descripcion</th>
                  <th>Cantidad</th>
                  <th>Precio</th>
                  <th class="text-end">Total</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="itemsTbody">
                <tr>
                  <td><input type="text" class="form-control desc" placeholder="Producto/Servicio"></td>
                  <td><input type="number" class="form-control qty" value="1" min="1" oninput="updateTotals()"></td>
                  <td><input type="number" class="form-control unit" value="0.00" step="0.01" oninput="updateTotals()"></td>
                  <td class="text-end fw-bold">0.00 EUR</td>
                  <td><button type="button" class="btn text-danger remove-btn"><i class="fas fa-trash"></i></button></td>
                </tr>
              </tbody>
            </table>
          </div>
          
          <button type="button" class="btn btn-secondary btn-sm mb-4" id="addItem">
            <i class="fas fa-plus me-2"></i>Añadir artículo
          </button>

          <div class="mt-4 text-end">
            <h3 id="grandTotal" class="mb-3">Total: 0.00 EUR</h3>
             <div id="budgetValidationMessage" class="small text-muted mb-2"></div>
            <button type="button" class="btn btn-primary" id="saveBtn">Guardar presupuesto</button>
          </div>
        </form>
      </div>

      <!-- Nueva sección: Lista de Presupuestos al final de la página -->
      <div class="modern-card mt-4">
        <h5 class="section-title"><i class="fas fa-history"></i> Presupuestos guardados</h5>
        <div class="table-responsive">
          <table class="table">
            <thead>
              <tr>
                <th>No.</th>
                <th>Fecha</th>
                <th>Cliente</th>
                <th>Total</th>
                <th>Estado</th>
                <th class="text-end">Acciones</th>
              </tr>
            </thead>
            <tbody id="budgetsTbody">
              <tr>
                <td colspan="6" class="text-center text-muted">Cargando presupuestos...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>

<div class="modal fade" id="budgetsModal" tabindex="-1">
  <div class="modal-dialog modal-xl">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Presupuestos guardados</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body text-center p-4">
        <p class="text-muted">Los presupuestos ahora se muestran al final de la página principal.</p>
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
      </div>
    </div>
  </div>
</div>

<!-- Modal Ver Detalle -->
<div class="modal fade" id="viewBudgetModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Detalle del Presupuesto</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="viewBudgetContent">
        <!-- Conteúdo preenchido via JS -->
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Firebase SDK (Compat) -->
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>

<!-- App Core Services -->
<script src="../shared/firebase-config.js"></script>
<script src="../shared/auth-system.js"></script>
<script src="../shared/firebase-sync.js"></script>
<script src="../shared/store.js"></script>  <script src="../shared/logo-loader.js"></script><script src="../shared/sidebar.js"></script>
<script src="script.js"></script>


  <script src="budget.inline.js"></script>
</body>
</html>
