<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clientes - FactuFácil</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    body { background-color: #f7f9fc; color: #1f2937; font-family: 'Inter', sans-serif; }
    .container { max-width: 1100px; margin-top: 24px; margin-bottom: 40px; }
    .card { border-radius: 12px; border: 1px solid #e6eaf0; }
    .text-danger { color: #b91c1c; }
    .form-label { font-weight: 600; }
    .table-wrapper { max-height: 440px; overflow-y: auto; }
    .react-app { min-height: 400px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h1><i class="fas fa-users"></i> Gestión de Clientes (React)</h1>
      <a href="frontPage/frontPage.html" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> Volver al Panel</a>
    </div>

    <div id="authStatus" class="alert alert-info d-none"></div>

    <!-- React App Container -->
    <div id="react-app" class="react-app"></div>

  </div>

  <!-- React CDN (synchronous loading) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
  <script src="shared/firebase-config.js"></script>
  <script src="shared/auth-system.js"></script>

  <!-- Client Service -->
  <script src="backend-1/backend/clientService.js"></script>
  <script src="backend-1/backend/providerService.js"></script>

  <!-- React App (wait for React to load) -->
  <script>
    // Wait for React to be available
    function loadReactApp() {
      if (typeof React !== 'undefined' && typeof ReactDOM !== 'undefined') {
        // Load App.js dynamically after React is ready
        const script = document.createElement('script');
        script.type = 'text/babel';
        script.src = 'backend-1/backend/App.js';
        script.onload = function() {
          // Initialize React App after App.js is loaded
          setTimeout(() => {
            const root = ReactDOM.createRoot(document.getElementById('react-app'));
            root.render(React.createElement(window.App));
          }, 100);
        };
        document.head.appendChild(script);
      } else {
        setTimeout(loadReactApp, 100);
      }
    }
    loadReactApp();
  </script>
</body>
</html>
